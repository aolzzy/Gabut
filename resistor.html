<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Resistor | Pembelajaran AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>

    <style>
      .rotation-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .rotation-controls button {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo"><a href="index.html">Home</a></div>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="hamburger">&#9776;</label>

        <ul class="menu">
          <li><a href="resistor.html">Resistor</a></li>
          <li><a href="kapasitor.html">Kapasitor</a></li>
          <li><a href="dioda.html">Dioda</a></li>
          <li><a href="transistor.html">Transistor</a></li>
        </ul>
      </nav>
    </header>

    <div class="container">
      <div class="info">
        <div id="penjelasan-resistor"></div>

        <button class="button-toggle" onclick="launchAR()">Aktifkan AR</button>

        <div class="rotation-controls">
          <button onclick="rx(15)">X+</button>
          <button onclick="rx(-15)">X-</button>
          <button onclick="ry(15)">Y+</button>
          <button onclick="ry(-15)">Y-</button>
          <button onclick="rz(15)">Z+</button>
          <button onclick="rz(-15)">Z-</button>
          <button onclick="resetRotation()">Reset</button>
        </div>
      </div>

      <div class="viewer">
        <model-viewer
          id="mv"
          src="resistor.glb"
          ar
          ar-modes="webxr scene-viewer quick-look"
          camera-controls
          shadow-intensity="1"
          alt="Model 3D Resistor"
          orientation="0deg 0deg 0deg">
        </model-viewer>
      </div>
    </div>

    <script src="penjelasankomponen.js"></script>
    <script src="script.js"></script>

    <script>
      document.getElementById("penjelasan-resistor").innerHTML =
        penjelasanKomponen.resistor;

      const mv = document.getElementById("mv");

      let x = 0;
      let y = 0;
      let z = 0;

      function applyRotation() {
        mv.setAttribute("orientation", `${x}deg ${y}deg ${z}deg`);

        if (typeof mv.updateFraming === "function") {
          mv.updateFraming();
        }
      }

      function rx(v) {
        x += v;
        applyRotation();
      }

      function ry(v) {
        y += v;
        applyRotation();
      }

      function rz(v) {
        z += v;
        applyRotation();
      }

      function resetRotation() {
        x = 0;
        y = 0;
        z = 0;
        applyRotation();
      }

      function launchAR() {
        mv.activateAR();
      }
    </script>
  </body>
</html>
