<model-viewer
  id="resistorViewer"
  src="resistor.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  alt="Model 3D Resistor">
</model-viewer>

<div class="anim-controls">
  <button class="button-toggle" id="btnAnimasiResistor" type="button">
    Mulai Animasi Resistor
  </button>
  <button class="button-toggle secondary" id="btnStopAnimasiResistor" type="button">
    Stop
  </button>
</div>

<div class="arus-bar">
  <div class="arus-flow" id="arusFlow"></div>
</div>

<p class="status-animasi" id="statusResistor">Status: standby</p>

<script src="animasi-resistor.js"></script>
